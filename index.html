<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream - Md Jihadur Rahaman</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0a;
            color: #fff;
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-size: 1.5rem; margin-bottom: 4px; }
        p.sub { color: #aaa; margin-bottom: 16px; font-size: 0.95rem; }

        .player-wrapper {
            width: 100%;
            max-width: 860px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        /* ফুলস্ক্রিন ফিক্স */
        .video-js.vjs-fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            padding-top: 0 !important;
            aspect-ratio: unset !important;
            border-radius: 0 !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
        }

        .video-js.vjs-fullscreen video,
        .video-js.vjs-fullscreen .vjs-tech {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }

        /* মোবাইলে নেটিভ ফুলস্ক্রিনেও কাজ করবে */
        video::-webkit-media-controls { display: flex !important; }
        video:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body>
    <h1>Md Jihadur Rahaman</h1>
    <p class="sub">🔴 FIFA WC 2026 — Live Stream</p>

    <div class="player-wrapper">
        <video
            id="my-video"
            class="video-js vjs-big-play-centered vjs-theme-city"
            controls
            preload="auto"
            playsinline
        >
            <source src="https://bldcmprod-cdn.toffeelive.com/cdn/live/slang/ten_cricket_576/ten_cricket_576.m3u8?">
        </video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video', {
            fluid: false,
            responsive: true,
            fill: false,
            html5: {
                vhs: {
                    overrideNative: true
                },
                nativeVideoTracks: false,
                nativeAudioTracks: false,
                nativeTextTracks: false
            }
        });

        // ফুলস্ক্রিনে object-fit: cover নিশ্চিত করা
        player.on('fullscreenchange', function () {
            var techEl = player.tech(true).el();
            if (player.isFullscreen()) {
                techEl.style.objectFit = 'cover';
                techEl.style.width = '100%';
                techEl.style.height = '100%';
            } else {
                techEl.style.objectFit = '';
            }
        });
    </script>
</body>
</html>
