<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Md Jihadur Rahaman Live</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    min-height:100vh;
    padding-bottom:40px;
}


h1{
    margin-top:25px;
    font-size:40px;
    text-shadow:0 0 20px #00eaff;
}


.sub{
    margin-top:10px;
    font-size:20px;
    color:#00eaff;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
}


/* Clock */

.clock{

    margin-top:15px;
    font-size:22px;
    color:#00ff99;
    font-weight:bold;
    text-shadow:0 0 15px #00ff99;

}


/* Live Badge */

.live{

    display:inline-flex;
    align-items:center;
    gap:8px;

    margin:20px;

    background:rgba(255,0,0,.15);
    border:1px solid rgba(255,0,0,.5);

    padding:8px 25px;
    border-radius:30px;

    font-weight:bold;

}


.live-dot{

    width:10px;
    height:10px;

    background:red;

    border-radius:50%;

    box-shadow:0 0 10px red;

    animation:pulse 1.5s infinite;

}


@keyframes pulse{

0%{
transform:scale(.9);
opacity:1;
}

70%{
transform:scale(1);
opacity:1;
box-shadow:0 0 0 10px rgba(255,0,0,0);
}

100%{
transform:scale(.9);
opacity:0;
}

}


/* Player */

.player{

    width:90%;
    max-width:1000px;

    margin:20px auto;

    background:#000;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,.5);

}


video{

    width:100%;
    display:block;
    background:black;

}


/* Button */


button{

    margin:20px;

    padding:14px 35px;

    border:none;

    border-radius:10px;

    background:#2563eb;

    color:white;

    font-size:17px;

    cursor:pointer;

}


button:hover{

    background:#00aaff;

}



.status{

    margin:15px;

    color:#aaa;

}



/* Footer */


.footer-container{

margin-top:40px;

}


.footer{

display:inline-flex;

align-items:center;

gap:10px;

background:#0077b5;

color:white;

padding:12px 35px;

border-radius:30px;

text-decoration:none;

font-weight:bold;

}


</style>

</head>


<body>



<h1>Md Jihadur Rahaman</h1>



<div class="sub">

<svg width="38" height="25" viewBox="0 0 36 24">

<rect width="36" height="24" fill="#009c3b"/>

<polygon points="18,3 33,12 18,21 3,12"
fill="#ffdf00"/>

<circle cx="18" cy="12" r="5"
fill="#002776"/>

</svg>


<span>#SupportingBrazil</span>

</div>



<!-- Time -->

<div class="clock" id="clock">

Loading time...

</div>




<div class="live">

<span class="live-dot"></span>

LIVE

</div>




<div class="player">

<video

id="video"

controls

autoplay

muted

playsinline>

</video>

</div>




<button onclick="playStream()">

Refresh Server

</button>




<div class="status" id="status">

Connecting...

</div>





<div class="footer-container">

<a 

href="https://www.linkedin.com/in/mdjihadurrahaman"

target="_blank"

class="footer">


LinkedIn

</a>


</div>





<script>


const video = document.getElementById("video");

const status = document.getElementById("status");


const stream =
"https://d1kep4defqj6r1.cloudfront.net/out/v1/4e21d5a122c549289dd6feab259266e8/index_1.m3u8";


let hls;



function playStream(){


status.innerHTML="Connecting...";



if(hls){

hls.destroy();

}



if(Hls.isSupported()){



hls = new Hls({

enableWorker:true,

lowLatencyMode:true,

liveSyncDurationCount:3,

maxBufferLength:10,

backBufferLength:30

});



hls.loadSource(stream);


hls.attachMedia(video);



hls.on(

Hls.Events.MANIFEST_PARSED,

()=>{


status.innerHTML="🔴 LIVE Connected";


video.play().catch(()=>{

status.innerHTML="▶ Tap Play";

});


});





hls.on(

Hls.Events.ERROR,

(event,data)=>{


console.log(data);



if(data.fatal){


status.innerHTML="⚠ Reconnecting...";


setTimeout(()=>{

playStream();

},5000);


}


});


}





else if(video.canPlayType(
"application/vnd.apple.mpegurl"
)){


video.src=stream;

video.play();

status.innerHTML="🔴 LIVE Connected";


}



}




window.onload=function(){

playStream();

};





// Clock


function updateClock(){


const now=new Date();


const time =
now.toLocaleTimeString("en-BD",{

hour:"2-digit",

minute:"2-digit",

second:"2-digit",

hour12:true

});



document.getElementById("clock").innerHTML =
"🕒 "+time;



}



setInterval(updateClock,1000);

updateClock();





window.addEventListener(

"online",

()=>{

playStream();

});


</script>



</body>
</html>
