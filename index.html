<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Md Jihadur Rahaman Live</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<style>

body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}


h1{
    margin-top:25px;
    font-size:40px;
    text-shadow:0 0 20px #00eaff;
}


.sub{
    color:#00eaff;
    font-size:18px;
}


.live{
    display:inline-block;
    background:red;
    padding:8px 25px;
    border-radius:30px;
    margin:20px;
    font-weight:bold;
}


.player{

    width:80%;
    max-width:1000px;
    height:550px;
    margin:auto;
    background:black;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 25px black;

}


video{

    width:100%;
    height:100%;

}


button{

    margin:20px;
    padding:14px 35px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;

}


button:hover{

background:#00aaff;

}


</style>


</head>



<body>


<h1>Md Jihadur Rahaman</h1>

<div class="sub">
#SupportingBrazil 🇧🇷
</div>


<div class="live">
● LIVE
</div>



<div class="player">

<video id="video"

controls
autoplay
muted
playsinline>

</video>

</div>



<button onclick="playStream()">
ONE CLICK PLAY
</button>



<script>


const video =
document.getElementById("video");



const stream =

"https://1nyaler.streamhostingcdn.top/stream/26/index.m3u8";



let hls;



function playStream(){


if(hls){

hls.destroy();

}



if(Hls.isSupported()){


hls = new Hls({

enableWorker:true,

lowLatencyMode:true,

liveSyncDurationCount:3

});



hls.loadSource(stream);

hls.attachMedia(video);



hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{

video.play().catch(()=>{});

});


}


else if(
video.canPlayType(
"application/vnd.apple.mpegurl"
)
){

video.src=stream;

video.play();

}


}



window.onload=function(){

playStream();

};



</script>



</body>

</html>
