<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream - Md Jihadur Rahaman</title>
    <style>
        body { 
            background: #0d0d0d; 
            color: #fff; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        .header-section {
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 5px; font-size: 2.2rem; letter-spacing: 0.5px; }
        .tagline { margin-top: 0; color: #00a8ff; font-weight: 500; font-size: 1rem; }
        .event-title { color: #aaa; font-size: 0.9rem; background: #222; padding: 4px 12px; border-radius: 15px; display: inline-block; }

        .player-wrapper { 
            max-width: 850px; 
            width: 100%; 
            margin: 10px auto 25px auto; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #111; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* রেসপন্সিভ প্লেয়ারের জন্য */
            aspect-ratio: 16 / 9;
        }
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        .branding-section {
            margin-top: 10px;
            max-width: 600px;
        }
        .branding-text {
            font-size: 0.95rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .buttons { display: flex; justify-content: center; gap: 15px; }
        .btn-linkedin { 
            padding: 10px 24px; 
            text-decoration: none; 
            color: white; 
            background: #0077b5; /* লিঙ্কডইন অফিসিয়াল কালার */
            border-radius: 25px; 
            font-weight: bold; 
            font-size: 0.9rem;
            transition: 0.3s ease;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
        }
        .btn-linkedin:hover { 
            background: #005a87;
            transform: translateY(-2px);
        }
        
        footer {
            margin-top: auto;
            padding-top: 40px;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <!-- হেডার ও ব্র্যান্ডিং -->
    <div class="header-section">
        <h1>Md Jihadur Rahaman</h1>
        <div class="tagline">Web Developer & Tech Enthusiast</div>
        <div class="event-title">⚽ FIFA WC2026 Live Stream Channel</div>
    </div>
    
    <!-- ভিডিও প্লেয়ার -->
    <div class="player-wrapper">
        <iframe src="https://cdn.stmify.com/embed-free/v1/tsn-1-ca-jw" marginheight="0" marginwidth="0" scrolling="no" frameborder="0" allowfullscreen allow="encrypted-media"></iframe>
    </div>

    <!-- লিঙ্কডইন কানেক্ট সেকশন -->
    <div class="branding-section">
        <div class="buttons">
            <a href="https://www.linkedin.com/in/mdjihadurrahaman/" target="_blank" class="btn-linkedin">
                Connect on LinkedIn
            </a>
        </div>
    </div>

    <!-- ফুটার -->
    <footer>
        &copy; 2026 Md Jihadur Rahaman. All Rights Reserved.
    </footer>

</body>
</html>
