<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Stream</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d1117;
    color:white;
    text-align:center;
    min-height:100vh;
}

h1{
    margin-top:25px;
    font-size:42px;
    text-shadow:0 0 15px #00aaff;
}

.sub{
    margin-top:8px;
    color:#00aaff;
    font-size:18px;
}

.live{
    margin:20px auto;
    background:#ff3030;
    width:75px;
    padding:6px;
    border-radius:20px;
    font-weight:bold;
}

.player-box{
    width:75%;
    max-width:1000px;
    height:560px;
    background:black;
    margin:25px auto;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px #000;
}

video{
    width:100%;
    height:100%;
    background:black;
}

.servers{
    margin-top:25px;
}

button{
    margin:8px;
    padding:14px 35px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:#1f2937;
    color:white;
    font-size:16px;
    font-weight:bold;
}

button:hover,
.active{
    background:#2563eb;
    box-shadow:0 0 15px #2563eb;
}

.footer{
    margin-top:35px;
    background:#0088cc;
    display:inline-block;
    padding:12px 45px;
    border-radius:25px;
}

</style>
</head>


<body>


<h1>Md Jihadur Rahaman</h1>

<div class="sub">
#SupportingBrazil 🇧🇷
</div>

<div class="live">
● LIVE
</div>


<div class="player-box">

<video id="video"
controls
autoplay
muted
playsinline>
</video>

</div>


<div class="servers">

<button class="active" onclick="changeServer(this)">
Server 1 (Toffee 4K)
</button>

<button onclick="changeServer(this)">
Server 2
</button>

<button onclick="changeServer(this)">
Server 3
</button>

<button onclick="changeServer(this)">
Server 4
</button>

</div>


<div class="footer">
LinkedIn
</div>



<script>


const stream =
"https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-2/0/master_3000.m3u8?hdntl=Expires=1782667986~_GO=Generated~URLPrefix=aHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature=AVXEwvc37dFUKGbQ0dUdyGFB9e8j-pC4-UVmGLize49cKF1QHePFJ7ZhXcBlcL7j6OUeKfpDZr_4ITmtn-YUkJb8GMMM";


const video = document.getElementById("video");


function playStream(){

if(Hls.isSupported()){

let hls = new Hls();

hls.loadSource(stream);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play().catch(()=>{});

});

}

else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src = stream;

video.play();

}

}


function changeServer(btn){

document.querySelectorAll("button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");


video.pause();

playStream();

}



window.onload=function(){

playStream();

};


</script>


</body>
</html>
