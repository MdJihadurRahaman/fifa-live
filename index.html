<!DOCTYPE html>
<html>
<head>

<title>FIFA Live</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background:#0d1117;
color:white;
text-align:center;
font-family:Arial;
}

h1{
margin-top:30px;
text-shadow:0 0 20px cyan;
}

video{
width:80%;
max-width:1000px;
height:550px;
background:black;
border-radius:15px;
}

button{
padding:12px 30px;
margin:10px;
border:0;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>


<body>


<h1>Md Jihadur Rahaman</h1>

<p>#SupportingBrazil 🇧🇷</p>


<video id="video"
controls
autoplay
muted
playsinline>
</video>


<br>


<button onclick="play()">Server 1</button>
<button onclick="play()">Server 2</button>
<button onclick="play()">Server 3</button>
<button onclick="play()">Server 4</button>



<script>


const url =
"https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-2/0/master_3000.m3u8";


let video =
document.getElementById("video");


let hls;


function play(){


if(hls){
hls.destroy();
}



if(Hls.isSupported()){


hls = new Hls({

enableWorker:true,

lowLatencyMode:true

});


hls.loadSource(url);

hls.attachMedia(video);


hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{

video.play();

});


}

else{

video.src=url;

video.play();

}


}



window.onload=play;



</script>


</body>
</html>
