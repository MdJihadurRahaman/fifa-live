<head>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='.9em' font-size='90'>📺</text></svg>">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top,#111827,#050505 60%);
color:#fff;
font-family:system-ui,Segoe UI,Roboto,sans-serif;
display:flex;
justify-content:center;
padding:20px 14px;
}

.container{
width:100%;
max-width:900px;
display:flex;
flex-direction:column;
gap:18px;
}


.header{
text-align:center;
}

.header h1{
font-size:clamp(1.8rem,5vw,3rem);
text-shadow:0 0 20px #00a8ff;
}


.tag{
color:#00a8ff;
font-weight:700;
margin-top:5px;
}


.live-box{
display:flex;
justify-content:center;
gap:10px;
align-items:center;
margin-top:12px;
}


.live{
background:#e50914;
padding:5px 14px;
border-radius:30px;
font-weight:bold;
animation:pulse 1.2s infinite;
}


@keyframes pulse{
50%{opacity:.35;transform:scale(.95)}
}


.viewer{
background:#18181b;
padding:5px 14px;
border-radius:30px;
color:#ddd;
}


.player{
position:relative;
aspect-ratio:16/9;
background:#000;
border-radius:18px;
overflow:hidden;
box-shadow:0 20px 60px #000;
}


video{
width:100%;
height:100%;
object-fit:cover;
}


.loading{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#0008;
font-weight:600;
}


.controls{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}


button,a{
border:0;
cursor:pointer;
padding:11px 22px;
border-radius:30px;
font-weight:700;
text-decoration:none;
}


.full{
background:#00a8ff;
color:white;
}


.linkedin{
background:#0077b5;
color:white;
}


.note{
text-align:center;
color:#aaa;
font-size:.9rem;
}


footer{
text-align:center;
color:#666;
font-size:.8rem;
margin-top:15px;
}

</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>Md Jihadur Rahaman</h1>

<div class="tag">
#SupportingBrazil 🇧🇷
</div>


<div class="live-box">

<div class="live">
🔴 LIVE
</div>

<div class="viewer">
 <span id="viewer">247</span> Watching
</div>

</div>

</div>



<div class="player" id="player">


<video id="video"
autoplay
muted
playsinline
controls>
</video>


<div class="loading" id="loading">
Starting stream...
</div>


</div>



<div class="controls">

<button class="full" onclick="fullscreenVideo()">
⛶ Fullscreen
</button>


<a class="linkedin"
href="https://www.linkedin.com/in/mdjihadurrahaman/"
target="_blank">
LinkedIn
</a>

</div>


<footer>
© 2026 Md Jihadur Rahaman
</footer>


</div>



<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<script>


const video=document.getElementById("video");
const loading=document.getElementById("loading");
const player=document.getElementById("player");


const streams=[

"https://trs1.aynaott.com/tsports/tracks-v1a1/mono.ts.m3u8"

];


let current=0;


function start(){

let url=streams[current];


if(Hls.isSupported()){


const hls=new Hls({
enableWorker:true,
lowLatencyMode:true,
maxBufferLength:10
});


hls.loadSource(url);

hls.attachMedia(video);


hls.on(Hls.Events.MANIFEST_PARSED,()=>{

loading.style.display="none";

video.play();

});


hls.on(Hls.Events.ERROR,(e,data)=>{


if(data.fatal){

loading.innerText="Reconnecting...";


hls.destroy();


setTimeout(()=>{

current=(current+1)%streams.length;

start();

},3000);


}


});


}


else{


video.src=url;

video.play();

video.onloadedmetadata=()=>{

loading.style.display="none";

};


}


}


function fullscreenVideo(){

if(player.requestFullscreen){

player.requestFullscreen();

}

}


start();


// fake live viewer movement
setInterval(()=>{

let n=parseInt(document.getElementById("viewer").innerText);

n += Math.floor(Math.random()*5)-2;

if(n<1)n=1;

document.getElementById("viewer").innerText=n;

},50);


</script>


</body>
</html>
