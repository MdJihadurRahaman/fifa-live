<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md Jihadur Rahaman - Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* বেসিক রিসেট ও ব্যাকগ্রাউন্ড */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d1117;
            background: radial-gradient(circle, #161b22 0%, #0d1117 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* কন্টেইনার */
        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        /* হেডার ও নাম */
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6), 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 5px;
        }
        .hashtag {
            color: #00aeef;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* লাইভ ব্যাজ */
        .live-badge {
            background-color: #dc2626;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }
        .live-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
            aspect-ratio: 16 / 9;
        }
        video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* সার্ভার বাটন বক্স ডিজাইন (ফ্লেক্স গ্রিড) */
        .server-box {
            margin: 20px auto;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .server-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            min-width: 110px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        
        /* হোভার ইফেক্ট */
        .server-btn:hover {
            background: #374151;
            transform: translateY(-1px);
        }

        /* 4k ব্যাজ বাটন স্পেশাল স্টাইল */
        .badge-4k {
            border-color: #eab308;
            color: #fde047;
        }
        .badge-4k:hover {
            background: rgba(234, 179, 8, 0.2);
        }

        /* অ্যাক্টিভ (চলমান) সার্ভার বাটন ইফেক্ট */
        .server-btn.active {
            background: #2563eb;
            border-color: #60a5fa;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.6);
            color: white;
        }

        /* লিঙ্কডইন বাটন */
        .btn-linkedin {
            display: inline-block;
            background: linear-gradient(180deg, #0077b5 0%, #005987 100%);
            color: white;
            text-decoration: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }
        .btn-linkedin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 119, 181, 0.6);
        }

        /* ফুটার */
        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        /* ব্লিন্কিং অ্যানিমেশন */
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* মোবাইল স্ক্রিন রেসপনসিভ */
        @media (max-width: 480px) {
            .header h1 { font-size: 1.8rem; }
            .server-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Md Jihadur Rahaman</h1>
            <div class="hashtag">#SupportingBrazil 🇧🇷</div>
            <div class="live-badge">LIVE</div>
        </div>

        <div class="video-wrapper">
            <video id="video" controls autoplay muted playsinline></video>
        </div>

        <div class="server-box">                    
            <button id="btn-0" class="server-btn badge-4k active" onclick="changeServer('https://nhjjhhjhjjhfjj.pages.dev/1782511273/6cccaaff5be44092a095c864bc8b6486/eZQaBXKMfJNW7ttS-jMyjL5FBePSPsrIZWodV3Z1CqM/fox4k-usa.m3u8', 0)">            
                Server 1     
            </button>                    
            <button id="btn-1" class="server-btn badge-hd" onclick="changeServer('https://tahmidx.cinemoja2.workers.dev/', 1)">            
                Server 2        
            </button>                    
            <button id="btn-2" class="server-btn badge-hd" onclick="changeServer('https://nhjjhhjhjjhfjj.pages.dev/1782510761/3023cd13a3e14f12a1f2a7cfec65500b/U7-6SPhUltFwYQWlHDZAR8OJgVYlYQmXJjjGcaDKyuE/fox-usa.m3u8', 2)">            
                Server 3        
            </button>                    
            <button id="btn-3" class="server-btn badge-hd" onclick="changeServer('https://nhjjhhjhjjhfjj.pages.dev/1782510867/f9a6277ea834417a99643095abd06d71/0I52ZEUvQEL0Uu_rrOKDB78GByQpBiOh00AZW-ZWnJY/fox-sports-1.m3u8', 3)">            
                Server 4        
            </button>                    
        </div> 

        <a href="https://www.linkedin.com" target="_blank" class="btn-linkedin">LinkedIn</a>

        <div class="footer">
            &copy; 2026 Md Jihadur Rahaman
        </div>
    </div>

    <script>
        var video = document.getElementById('video');
        var hls = null;

        // ভিডিও লোড করার মূল ফাংশন
        function loadStream(url) {
            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls({ maxBufferLength: 30 });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(function(e) {
                        console.log("Autoplay prevented, waiting for user interaction");
                    });
                });
            } 
            // সাফারি বা আইওএস (iOS) ব্রাউজারের নেটিভ সাপোর্টের জন্য
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // বাটন ক্লিক করে সার্ভার চেঞ্জ করার ফাংশন
        function changeServer(url, btnId) {
            loadStream(url);

            // সব বাটন থেকে 'active' ক্লাস রিমুভ করা
            var buttons = document.querySelectorAll('.server-btn');
            buttons.forEach(function(btn) {
                btn.classList.remove('active');
            });

            // নির্দিষ্ট ক্লিক করা বাটনে 'active' ক্লাস যোগ করা
            var activeBtn = document.getElementById('btn-' + btnId);
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }

        // পেজ লোড হওয়ার সাথে সাথে ডিফল্টভাবে Server 5 (যা এখন btn-0) চালু হবে
        window.onload = function() {
            var defaultUrl = document.getElementById('btn-0').getAttribute('onclick').match(/'([^']+)'/)[1];
            loadStream(defaultUrl);
        };
    </script>

</body>
</html>
